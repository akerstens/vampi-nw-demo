name: Active Scan

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  active-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run VAmPI 
        run: docker compose up -d
        
      - name: Test VAmPI
        run: sleep 5 && curl http://localhost:5002/ --retry 10 --retry-delay 1 

      - name: Createdb
        run: curl http://localhost:5002/createdb

      - name: Run Active Scan
