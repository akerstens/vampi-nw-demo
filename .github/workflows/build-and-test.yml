name: Active Scan

on:
  push:
    branches: [ main ]
  pull_request:
  repository_dispatch:
  workflow_dispatch:

jobs:
  active-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Standalone VAmPI Container
        # Run only the vulnerable container flavor directly on host port 5002
        run: |
          docker run -d -p 5002:5000 -e vulnerable=1 erev0s/vampi:latest
        
      - name: Test VAmPI
        run: sleep 10 && curl http://localhost:5002/ --retry 10 --retry-delay 2 

      - name: Createdb
        run: curl http://localhost:5002/createdb

      - name: Run Active Scan
        uses: nonamesec/active-scan-action@v1
        with:
          ENV_ID: "89e0682a-efc0-43f8-9c98-cbf2852049d5"
          ACTIVE_REGISTRY_URL: "us-central1-docker.pkg.dev/noname-artifacts/nns-docker"
          ACTIVE_REGISTRY_USER: "_json_key_base64"
          ACTIVE_REGISTRY_PASSWORD: ""
          ACTIVE_API_URL: "https://ms-phase3-test.nonamesec.com/active"
          ACTIVE_API_TOKEN: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJhcGlLZXkiOiI5N2IzOGU5Zi00YjZiLTQ3ZjEtYjFhNy1lZGMwZWRkOThjOWQiLCJpZCI6IjE1ZTYzNDhmLTdhMDktNDE5ZC04MGJiLWVhN2YyNGQ5YTFkMyIsImlhdCI6MTc4MDI1MTI3MywiZXhwIjoxNzk1ODAzMjczLCJhdWQiOlsibm9uYW1lLW1hbmFnZW1lbnQtYXBpIl0sImlzcyI6Im5vYXV0aCJ9.htsP_SuQZdv8-G_P-pVY-NcTdMmzDbE4wFn1QoNEJnitk5fgxAu1TveLL6tL7UBcB84eqqoVlwmXz-nrP0Y_HarLmnCNFhXamRDOedW19KQ-UWtUGx16L2NMuYsSuJswklzjfPeMOGK2A2qm7pP75QdcRujwtVQIKx4RDLsnJAv9qQwZVe2tK_7gdoAd71NrylNJJvjzspKhhRD1xOIgNM3G_C5vMygWF0ZIRx6eIiUB8hwZ3qVV1jCJ0ZtUlJljv7ARfKhuRxpY0pl164mjbzbmincYgXPzNuJ7pFbxcBEqb8kJcUxp4zDqGj_MJF68FE6CpG4IFlO0mDAvVyQ0AQ"
