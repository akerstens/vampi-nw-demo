name: Active Scan

on:
  push:
    branches: [ main ]
  pull_request:
  repository_dispatch:
  workflow_dispatch:

jobs:
  active-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Standalone VAmPI Container
        # Run only the vulnerable container flavor directly on host port 5002
        run: |
          docker run -d -p 5002:5000 -e vulnerable=1 erev0s/vampi:latest
        
      - name: Test VAmPI
        run: sleep 10 && curl http://localhost:5002/ --retry 10 --retry-delay 2 

      - name: Createdb
        run: curl http://localhost:5002/createdb

      - name: Run Active Scan
        uses: nonamesec/active-scan-action@v1
        with:
          ENV_ID: "b2712457-b921-44e1-bbf8-b529ae26266d"
          ACTIVE_REGISTRY_URL: "us-central1-docker.pkg.dev/noname-artifacts/nns-docker"
          ACTIVE_REGISTRY_USER: "_json_key_base64"
          ACTIVE_REGISTRY_PASSWORD: ""
          ACTIVE_API_URL: "https://ms-phase3-test.nonamesec.com/active"
          ACTIVE_API_TOKEN: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJhcGlLZXkiOiIzZjgwODUzMS00YTkyLTQzMjMtOGJiNy05NmU3ZThmMmYwOTAiLCJpZCI6IjE1ZTYzNDhmLTdhMDktNDE5ZC04MGJiLWVhN2YyNGQ5YTFkMyIsImlhdCI6MTc4MDQyNzkyMiwiZXhwIjoxNzk1OTc5OTIyLCJhdWQiOlsibm9uYW1lLW1hbmFnZW1lbnQtYXBpIl0sImlzcyI6Im5vYXV0aCJ9.TDdGXKIKGGAcEcYYyKfj8NJERq8h0wUmD9n32uco84BJDmHI_skTRyQqd45aTbXTuA3JlOovkCNvULzPPp5qjXLXWHda_3jeGIiR_e3670G-VhsXdWjLMvWszbm2W4dWrrEYKWnzVWOLpVLRttPq286ykLF3qcihA0Cg0wPtGzrD4MxncErvSvTeWwBSntcYvpRpfuTYp9YW0NArOAIfz_lACh_wqBeSrVBHYyGCPysjGM34wThbUXcwgREP42E13A51mI2JkSarSjkXwfEJbE8OcFt6meDe_hBNJJIlnsNzZxpKmI9OzzAId_b10b-LbG5C7rsCnq96yFU4t72S0g"
